name: Flutter Multi-Platform CI/CD

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
      - name: Install dependencies
        run: flutter pub get
      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --debug 

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          architecture: x64
      - name: Install dependencies
        run: flutter pub get
      - name: Build iOS (No-codesign)
        run: flutter build ios --debug --no-codesign

  report:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "### Build Artifacts Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- Android APK (Debug) generated successfully." >> $GITHUB_STEP_SUMMARY
          echo "- iOS Build (No-codesign) validated." >> $GITHUB_STEP_SUMMARY
          echo "- Ready for distribution to Firebase & TestFlight (Simulation Mode)." >> $GITHUB_STEP_SUMMARY

