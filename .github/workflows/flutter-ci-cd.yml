name: Flutter Multi-Platform CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - name: Install dependencies
        run: flutter pub get
      - name: Setup Config Files (Android)
        run: |
          cp lib/firebase_options_dummy.dart lib/firebase_options.dart
          cp .env_dummy .env
          # Creamos el google-services.json falso
          echo '{"project_info":{"project_number":"0","project_id":"fake","storage_bucket":"fake.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:0:android:0","android_client_info":{"package_name":"com.example.servicesMarketplaceMobile"}},"api_key":[{"current_key":"fake"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}]}' > android/app/google-services.json
      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --debug 

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          architecture: x64
      - name: Install dependencies
        run: flutter pub get
      - name: Setup Config Files (iOS)
        run: |
          cp lib/firebase_options_dummy.dart lib/firebase_options.dart
          cp .env_dummy .env
          # Creamos el plist de Firebase falso para iOS
          echo '<?xml version="1.0" encoding="UTF-8"?><!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd"><plist version="1.0"><dict><key>API_KEY</key><string>fake</string><key>GCM_SENDER_ID</key><string>0</string><key>PLIST_VERSION</key><string>1</string><key>BUNDLE_ID</key><string>com.example.servicesMarketplaceMobile</string><key>PROJECT_ID</key><string>fake</string><key>STORAGE_BUCKET</key><string>fake.appspot.com</string><key>IS_ADS_ENABLED</key><false/><key>IS_ANALYTICS_ENABLED</key><false/><key>IS_APPINVITE_ENABLED</key><false/><key>IS_GCM_ENABLED</key><false/><key>IS_SIGNIN_ENABLED</key><false/><key>GOOGLE_APP_ID</key><string>1:0:ios:0</string></dict></plist>' > ios/Runner/GoogleService-Info.plist

      - name: Initialize Podfile and Set iOS 15
        run: |
          cd ios
          if [ ! -f Podfile ]; then
            flutter create . --platforms ios
          fi
          # Forzamos la versión 15.0 para que firebase_auth no llore
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" Podfile
          if ! grep -q "platform :ios" Podfile; then
            echo "platform :ios, '15.0'" | cat - Podfile > temp && mv temp Podfile
          fi
      - name: Build iOS (No-codesign)
        run: flutter build ios --debug --no-codesign

  report:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "### Build Artifacts Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- Android APK (Debug) generated successfully." >> $GITHUB_STEP_SUMMARY
          echo "- iOS Build (No-codesign) validated." >> $GITHUB_STEP_SUMMARY
          echo "- Ready for distribution to Firebase & TestFlight (Simulation Mode)." >> $GITHUB_STEP_SUMMARY

  # --- FASE 4: CD (Estrategia de Distribución Multi-Plataforma) ---
