name: Flutter Multi-Platform CI/CD

on:
  push:
    branches: [ '*' ]
  pull_request:
    branches: [ main ]

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
      - name: Install dependencies
        run: flutter pub get
      - name: Setup Firebase Config
        run: cp lib/firebase_options_dummy.dart lib/firebase_options.dart
      - name: Setup .env file
        run: cp .env_dummy .env
      - name: Build Android App Bundle (AAB)
        run: flutter build appbundle --debug 

  build-ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          architecture: x64
      - name: Install dependencies
        run: flutter pub get
      # 1. Renombramos el dummy para que no falte el archivo de Firebase
      - name: Setup Firebase Config
        run: cp lib/firebase_options_dummy.dart lib/firebase_options.dart
      - name: Setup .env file
        run: cp .env_dummy .env

      # 2. Obligamos a que se cree el entorno de iOS y ajustamos la versión
      - name: Initialize Podfile and Set iOS 15
        run: |
          cd ios
          # Si el Podfile no existe, lo creamos con un comando de flutter
          if [ ! -f Podfile ]; then
            echo "Podfile not found, initializing..."
            flutter build ios --debug --no-codesign --dry-run
          fi
          # Ahora que existe, forzamos la versión 15.0
          sed -i '' "s/# platform :ios, '12.0'/platform :ios, '15.0'/g" Podfile
          sed -i '' "s/platform :ios, '13.0'/platform :ios, '15.0'/g" Podfile
          # Si por alguna razón no estaba la línea, la insertamos al inicio
          if ! grep -q "platform :ios" Podfile; then
            echo "platform :ios, '15.0'" | cat - Podfile > temp && mv temp Podfile
          fi
      - name: Build iOS (No-codesign)
        run: flutter build ios --debug --no-codesign

  report:
    needs: [build-android, build-ios]
    runs-on: ubuntu-latest
    steps:
      - name: Deployment Summary
        run: |
          echo "### Build Artifacts Summary 🚀" >> $GITHUB_STEP_SUMMARY
          echo "- Android APK (Debug) generated successfully." >> $GITHUB_STEP_SUMMARY
          echo "- iOS Build (No-codesign) validated." >> $GITHUB_STEP_SUMMARY
          echo "- Ready for distribution to Firebase & TestFlight (Simulation Mode)." >> $GITHUB_STEP_SUMMARY

  # --- FASE 4: CD (Estrategia de Distribución Multi-Plataforma) ---
